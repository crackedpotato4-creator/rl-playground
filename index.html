<!DOCTYPE html>
<html>
<head>
  <title>RL Blocks</title>
</head>
<body>
  <h1>RL Blocks</h1>
  <p>A visual reinforcement learning playground for students.</p>

  <button onclick="trainAgent()">Train Agent</button>

  <p id="output">Click the button to start training.</p>

  <script>
    function trainAgent() {
      document.getElementById("output").textContent =
        "The agent is training... eventually this will run the RL simulation.";
    }
  </script>
</body>
</html>
